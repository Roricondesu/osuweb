name: ✨ 功能请求 / Feature Request
description: 为 osu!web 提出新功能的建议 / Suggest a new feature for osu!web
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你为 osu!web 提出建议！在提交前，请先搜索已有 Issue 以避免重复。
        Thank you for suggesting a feature for osu!web! Please search existing issues before submitting to avoid duplicates.

  - type: textarea
    id: feature-description
    attributes:
      label: 功能描述 / Feature Description
      description: 清晰地描述你希望添加的功能。/ A clear and concise description of the feature you would like to see.
      placeholder: "例如：在游戏内添加 Speed Adjust（调速）的可视化节奏预览。/ e.g., Add a visual rhythm preview for Speed Adjust in-game."
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 解决的问题 / Problem It Solves
      description: 这个功能解决或改善了什么问题？/ What problem does this feature solve or improve?
      placeholder: "例如：目前调速时无法直观感知速度变化对节奏的影响。/ e.g., Currently there is no intuitive way to feel how speed changes affect rhythm."
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: 建议方案 / Proposed Solution
      description: 你希望这个功能如何工作？/ How would you like this feature to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案 / Alternatives Considered
      description: 你是否考虑过其他替代方案或现有变通方法？/ Have you considered any alternatives or current workarounds?
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: 附加信息 / Additional Context
      description: 任何有助于理解该功能请求的补充信息、截图或参考链接。/ Any additional context, screenshots, or reference links that help explain this request.
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: 确认 / Confirmation
      options:
        - label: 我已搜索过现有 Issue，确认这不是重复请求。/ I have searched existing issues and confirmed this is not a duplicate.
          required: true
